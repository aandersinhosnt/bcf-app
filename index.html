<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BCF — Controle de Importação</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.47.0/tabler-icons.min.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f5f5f3; --surface:#fff; --surface2:#f1efe8;
  --text:#1a1a18; --text2:#5f5e5a; --text3:#888780;
  --border:rgba(0,0,0,0.12); --border2:rgba(0,0,0,0.22);
  --radius:12px; --radius-sm:8px;
}
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg); color:var(--text); max-width:430px; margin:0 auto; min-height:100vh; font-size:14px; }

/* HEADER */
.app-header { background:var(--surface); border-bottom:.5px solid var(--border); padding:14px 16px 0; position:sticky; top:0; z-index:100; }
.header-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:2px; }
.app-title { font-size:17px; font-weight:600; }
.app-sub { font-size:11px; color:var(--text3); margin-bottom:10px; }
.refresh-btn { background:none; border:none; color:#185fa5; font-size:20px; cursor:pointer; padding:2px; }
.tabs { display:flex; }
.tab { flex:1; padding:9px 2px; text-align:center; font-size:10px; font-weight:500; color:var(--text3); border-bottom:2px solid transparent; cursor:pointer; line-height:1.4; }
.tab.active { color:#185fa5; border-bottom-color:#185fa5; }
.tab i { font-size:16px; display:block; margin-bottom:1px; }

/* SECTIONS */
.section { display:none; padding:12px 16px 90px; }
.section.active { display:block; }

/* LOADING */
.loading { text-align:center; padding:60px 20px; }
.spinner { width:36px; height:36px; border:3px solid var(--border2); border-top-color:#185fa5; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 14px; }
@keyframes spin { to { transform:rotate(360deg); } }

/* ALERTAS */
.alertas-bar { margin-bottom:14px; }
.alerta-item { display:flex; align-items:flex-start; gap:10px; padding:11px 14px; border-radius:var(--radius); margin-bottom:8px; }
.alerta-item.urgente { background:#fcebeb; border:.5px solid #f7c1c1; }
.alerta-item.aviso { background:#faeeda; border:.5px solid #fac775; }
.alerta-item.info { background:#e6f1fb; border:.5px solid #b5d4f4; }
.alerta-icon { font-size:18px; margin-top:1px; flex-shrink:0; }
.alerta-item.urgente .alerta-icon { color:#a32d2d; }
.alerta-item.aviso .alerta-icon { color:#854f0b; }
.alerta-item.info .alerta-icon { color:#0c447c; }
.alerta-titulo { font-size:13px; font-weight:600; }
.alerta-item.urgente .alerta-titulo { color:#a32d2d; }
.alerta-item.aviso .alerta-titulo { color:#854f0b; }
.alerta-item.info .alerta-titulo { color:#0c447c; }
.alerta-desc { font-size:11px; margin-top:2px; color:var(--text2); line-height:1.5; }

/* TOTALS */
.totals-banner { background:#042c53; color:#b5d4f4; border-radius:var(--radius); padding:14px 16px; margin-bottom:14px; }
.tb-title { font-size:11px; opacity:.7; margin-bottom:4px; }
.tb-val { font-size:28px; font-weight:700; color:#e6f1fb; }
.tb-row { display:flex; gap:20px; margin-top:10px; }
.tbi-l { font-size:10px; opacity:.7; }
.tbi-v { font-size:14px; font-weight:600; color:#e6f1fb; }

/* SUMMARY GRID */
.summary-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-bottom:14px; }
.sum-card { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); padding:14px; }
.sum-label { font-size:11px; color:var(--text3); margin-bottom:4px; }
.sum-val { font-size:18px; font-weight:600; }

/* CARDS */
.card { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); margin-bottom:10px; overflow:hidden; }
.card-header { padding:12px 14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
.card-header:active { background:var(--surface2); }
.sup-ini { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
.card-title { flex:1; min-width:0; }
.card-title h3 { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.card-title p { font-size:12px; color:var(--text3); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chevron { color:var(--text3); font-size:16px; transition:transform .2s; flex-shrink:0; }
.card.open .chevron { transform:rotate(180deg); }
.card-body { display:none; padding:0 14px 14px; border-top:.5px solid var(--border); }
.card.open .card-body { display:block; }

/* STATS */
.stat-row { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-top:12px; }
.stat-box { background:var(--surface2); border-radius:var(--radius-sm); padding:8px 10px; }
.sl { font-size:10px; color:var(--text3); margin-bottom:2px; }
.sv { font-size:13px; font-weight:600; }

/* BADGES */
.badge { display:inline-flex; align-items:center; padding:3px 9px; border-radius:20px; font-size:11px; font-weight:500; }
.bg-green { background:#eaf3de; color:#3b6d11; }
.bg-blue { background:#e6f1fb; color:#0c447c; }
.bg-amber { background:#faeeda; color:#854f0b; }
.bg-gray { background:#f1efe8; color:#444441; }
.bg-red { background:#fcebeb; color:#a32d2d; }

/* INVOICE LIST */
.inv-list { margin-top:8px; }
.inv-row { padding:9px 0; border-bottom:.5px solid var(--border); display:flex; justify-content:space-between; align-items:flex-start; }
.inv-row:last-child { border-bottom:none; }
.ir-ref { font-size:13px; font-weight:500; }
.ir-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.ir-val { text-align:right; flex-shrink:0; margin-left:8px; }
.ir-total { font-size:13px; font-weight:600; }
.ir-saldo { font-size:11px; margin-top:2px; }
.verde { color:#3b6d11; } .vermelho { color:#a32d2d; }

/* PAGAMENTOS */
.pag-item { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); padding:12px 14px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center; gap:8px; }
.pi-left h4 { font-size:13px; font-weight:600; }
.pi-left p { font-size:11px; color:var(--text3); margin-top:2px; }
.pi-right { text-align:right; flex-shrink:0; }
.pi-val { font-size:14px; font-weight:600; color:#a32d2d; }
.pi-date { font-size:11px; color:var(--text3); margin-top:2px; }

/* CRONOGRAMA */
.crono-item { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); padding:12px 14px; margin-bottom:8px; }
.crono-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:10px; }
.crono-ref { font-size:13px; font-weight:600; }
.crono-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.crono-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.crono-box { background:var(--surface2); border-radius:6px; padding:9px 10px; }
.cb-label { font-size:10px; color:var(--text3); }
.cb-val { font-size:14px; font-weight:600; margin-top:3px; }
.cb-val.vencido { color:#a32d2d; }
.cb-val.proximo { color:#854f0b; }
.cb-date { font-size:11px; color:var(--text2); margin-top:2px; }

/* EMBARQUES */
.emb-item { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); padding:12px 14px; margin-bottom:8px; }
.emb-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:6px; }
.emb-nome { font-size:13px; font-weight:600; }
.emb-sub { font-size:11px; color:var(--text3); margin-top:2px; }
.emb-desc { font-size:11px; color:var(--text2); margin:6px 0; line-height:1.5; }
.emb-datas { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; margin-top:8px; }
.emb-dt { background:var(--surface2); border-radius:6px; padding:7px 8px; }
.ed-l { font-size:10px; color:var(--text3); }
.ed-v { font-size:12px; font-weight:600; margin-top:2px; }
.ed-v.atrasado { color:#a32d2d; }

/* BUSCA */
.search-wrap { position:relative; padding:10px 0 12px; }
.s-icon { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--text3); font-size:16px; pointer-events:none; }
.s-input { width:100%; padding:10px 12px 10px 36px; border:.5px solid var(--border2); border-radius:var(--radius-sm); background:var(--surface2); color:var(--text); font-size:14px; outline:none; }
.result-item { background:var(--surface); border-radius:var(--radius); border:.5px solid var(--border); padding:12px 14px; margin-bottom:8px; }
.r-tag { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:.04em; margin-bottom:3px; }
.r-title { font-size:14px; font-weight:600; }
.r-sub { font-size:12px; color:var(--text2); margin-top:3px; line-height:1.5; }

.sec-title { font-size:11px; font-weight:600; color:var(--text3); text-transform:uppercase; letter-spacing:.05em; margin:14px 0 8px; }
.spacer { height:12px; }

/* ERROR */
.error-box { background:#fcebeb; border-radius:var(--radius); padding:16px; margin:12px 0; border:.5px solid #f7c1c1; }
.error-box h3 { color:#a32d2d; font-size:14px; margin-bottom:6px; }
.error-box p { color:#a32d2d; font-size:12px; line-height:1.6; }
.retry-btn { width:100%; padding:13px; border-radius:var(--radius); background:#185fa5; color:#fff; border:none; font-size:14px; font-weight:600; cursor:pointer; margin-top:10px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="header-row">
    <div>
      <div class="app-title">BCF Importação</div>
      <div class="app-sub" id="app-sub">Extrapower · carregando...</div>
    </div>
    <button class="refresh-btn" onclick="reload()" title="Atualizar"><i class="ti ti-refresh"></i></button>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="setTab('alertas',this)"><i class="ti ti-bell"></i>Alertas</div>
    <div class="tab" onclick="setTab('resumo',this)"><i class="ti ti-layout-dashboard"></i>Resumo</div>
    <div class="tab" onclick="setTab('pagamentos',this)"><i class="ti ti-receipt"></i>Pagamentos</div>
    <div class="tab" onclick="setTab('cronograma',this)"><i class="ti ti-calendar-due"></i>Cronograma</div>
    <div class="tab" onclick="setTab('embarques',this)"><i class="ti ti-ship"></i>Embarques</div>
    <div class="tab" onclick="setTab('busca',this)"><i class="ti ti-search"></i>Buscar</div>
  </div>
</div>

<div id="sec-alertas" class="section active"><div class="loading"><div class="spinner"></div><p style="color:var(--text3);font-size:13px">Carregando...</p></div></div>
<div id="sec-resumo" class="section"><div class="loading"><div class="spinner"></div></div></div>
<div id="sec-pagamentos" class="section"><div class="loading"><div class="spinner"></div></div></div>
<div id="sec-cronograma" class="section"><div class="loading"><div class="spinner"></div></div></div>
<div id="sec-embarques" class="section"><div class="loading"><div class="spinner"></div></div></div>
<div id="sec-busca" class="section">
  <div class="search-wrap">
    <i class="ti ti-search s-icon"></i>
    <input class="s-input" type="text" placeholder="Fornecedor, invoice, BT, produto..." id="s-input" oninput="doSearch(this.value)">
  </div>
  <div id="search-results"><p style="color:var(--text3);font-size:13px;text-align:center;padding:30px 0">Digite para buscar</p></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxRFCs2GEdWzRIe19Ex29aTl9Y2gJQhf0L9P8UQGWYNdYXdK8RriHcEtj6XPsYVUCnhBA/exec';
const COLORS = {
  SHI:{bg:'#e6f1fb',fg:'#0c447c'}, XMN:{bg:'#eaf3de',fg:'#3b6d11'},
  MLG:{bg:'#faeeda',fg:'#854f0b'}, BCF:{bg:'#fbeaf0',fg:'#993556'},
  MIK:{bg:'#eeedfe',fg:'#3c3489'}, HSN:{bg:'#f1efe8',fg:'#444441'},
};
let D = {};
let lastSync = null;

// ── API ──────────────────────────────────────────────────────────────────────
function fetchSheet(name) {
  return new Promise((resolve, reject) => {
    const cbName = 'bcfcb_' + Math.random().toString(36).substring(2);
    const script = document.createElement('script');
    const timeout = setTimeout(() => {
      delete window[cbName];
      document.body.removeChild(script);
      reject(new Error('Timeout ao carregar ' + name));
    }, 15000);
    window[cbName] = function(data) {
      clearTimeout(timeout);
      delete window[cbName];
      document.body.removeChild(script);
      if(data && data.error) reject(new Error(data.error));
      else resolve(data);
    };
    script.src = API + '?sheet=' + encodeURIComponent(name) + '&callback=' + cbName;
    script.onerror = () => { clearTimeout(timeout); reject(new Error('Erro ao carregar ' + name)); };
    document.body.appendChild(script);
  });
}
async function loadAll() {
  const forn = await fetchSheet('Fornecedores');
  const ped  = await fetchSheet('Pedidos');
  const pag  = await fetchSheet('Pagamentos');
  const cron = await fetchSheet('Cronograma');
  const emb  = await fetchSheet('Embarques');
  const [,,,] = [forn, ped, pag, cron, emb]; // unused destructure kept for compat
  D = { forn, ped: ped.filter(p => val(p,'Invoice / BT') && val(p,'Invoice / BT') !== 'TOTAL'), pag: pag.filter(p => val(p,'Fornecedor') && num(p,'Valor') > 0), cron: cron.filter(r => val(r,'Fornecedor')), emb: emb.filter(r => val(r,'Fornecedor')) };
  lastSync = new Date();
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function val(obj, k) { return String(obj[k]||'').trim(); }
function num(obj, k) { return parseFloat(String(obj[k]||0).replace(/[^\d.-]/g,''))||0; }
function fmt(v, m='USD') {
  if(!v) return m==='RMB'?'¥0':'$0';
  return (m==='RMB'?'¥':'$') + Math.round(v).toLocaleString('pt-BR');
}
function fmtBRL(v) { return 'R$ ' + Math.round(v).toLocaleString('pt-BR'); }
function parseDate(v) {
  if(!v || v==='' || v==='—') return null;
  if(v instanceof Date) return isNaN(v)?null:v;
  const s = String(v).trim();
  if(!s || s==='0' || s==='null') return null;

  // DD/MM/YYYY ou D/M/YY
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m) return new Date(m[3].length===2?'20'+m[3]:m[3], parseInt(m[2])-1, parseInt(m[1]));

  // YYYY-MM-DD
  m = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(m) return new Date(m[1], parseInt(m[2])-1, parseInt(m[3]));

  // MM/DD/YYYY (formato americano que Sheets às vezes envia)
  m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if(m) {
    const d1 = parseInt(m[1]), d2 = parseInt(m[2]), yr = parseInt(m[3]);
    // se primeiro número > 12, é dia/mês
    if(d1 > 12) return new Date(yr, d2-1, d1);
    // senão assume mês/dia (americano)
    return new Date(yr, d1-1, d2);
  }

  // Número serial do Excel/Sheets (ex: 46123)
  const num = parseFloat(s);
  if(!isNaN(num) && num > 40000 && num < 60000) {
    // Sheets usa 30/12/1899 como epoch
    return new Date(Math.round((num - 25569) * 86400000));
  }

  // Tenta Date.parse como fallback
  const d = new Date(s);
  return isNaN(d) ? null : d;
}
function fmtDate(v) {
  const d = parseDate(v); if(!d) return '—';
  return d.toLocaleDateString('pt-BR');
}
function diasAte(v) {
  const d = parseDate(v); if(!d) return null;
  return Math.ceil((d - new Date()) / 86400000);
}
function badge(s) {
  const map = {'Ativo':'bg-blue','Finalizado':'bg-green','Em produção':'bg-amber','Embarcado':'bg-blue','Cancelado':'bg-gray','Pago':'bg-green'};
  return `<span class="badge ${map[s]||'bg-gray'}">${s||'—'}</span>`;
}
function ini(n) { return String(n).split(' ').map(w=>w[0]||'').join('').substring(0,2).toUpperCase(); }
function cor(cod) { return COLORS[cod]||COLORS.HSN; }
function saldoForn(cod) {
  const peds = D.ped.filter(p=>val(p,'Código')==cod||val(p,'Codigo')==cod);
  return { usd: peds.reduce((s,p)=>s+num(p,'Saldo USD'),0), rmb: peds.reduce((s,p)=>s+num(p,'Saldo RMB'),0) };
}

// ── ALERTAS ──────────────────────────────────────────────────────────────────
function buildAlertas() {
  const hoje = new Date();
  const alertas = [];

  // Vencimentos
  D.cron.forEach(c => {
    const nome = val(c,'Fornecedor'), inv = val(c,'Invoice / Pedido'), moeda = val(c,'Moeda')||'USD';
    [[val(c,'Data 30%'), num(c,'Valor 30%'),'30%'],[val(c,'Data 70%'), num(c,'Valor 70%'),'70%']].forEach(([dt, vl, pct]) => {
      if(!dt || vl <= 0) return;
      const dias = diasAte(dt);
      if(dias === null) return;
      if(dias < 0) alertas.push({ tipo:'urgente', icon:'ti-alert-circle', titulo:`Vencido há ${Math.abs(dias)} dia${Math.abs(dias)>1?'s':''}`, desc:`${nome} · ${inv} · Parcela ${pct}: ${fmt(vl,moeda)} (venceu ${fmtDate(dt)})` });
      else if(dias <= 7) alertas.push({ tipo:'urgente', icon:'ti-clock', titulo:`Vence em ${dias} dia${dias!==1?'s':''}`, desc:`${nome} · ${inv} · Parcela ${pct}: ${fmt(vl,moeda)} (${fmtDate(dt)})` });
      else if(dias <= 15) alertas.push({ tipo:'aviso', icon:'ti-clock', titulo:`Vence em ${dias} dias`, desc:`${nome} · ${inv} · Parcela ${pct}: ${fmt(vl,moeda)} (${fmtDate(dt)})` });
    });
  });

  // Embarques atrasados
  D.emb.forEach(e => {
    const status = val(e,'Status');
    if(status.includes('Finalizado')||status.includes('Cancelado')) return;
    const eta = val(e,'ETA')||val(e,'Eta');
    const etd = val(e,'ETD')||val(e,'Etd');
    const nome = val(e,'Fornecedor'), inv = val(e,'Pedido / Invoice');
    if(eta) {
      const dias = diasAte(eta);
      if(dias !== null && dias < 0) alertas.push({ tipo:'urgente', icon:'ti-ship', titulo:`Embarque atrasado (ETA passou)`, desc:`${nome} · ${inv} · ETA era ${fmtDate(eta)} · Status: ${status||'—'}` });
      else if(dias !== null && dias <= 7) alertas.push({ tipo:'aviso', icon:'ti-ship', titulo:`Chegada em ${dias} dia${dias!==1?'s':''}`, desc:`${nome} · ${inv} · ETA: ${fmtDate(eta)}` });
    }
    if(!etd && status.toLowerCase().includes('aguard')) {
      alertas.push({ tipo:'info', icon:'ti-exclamation-mark', titulo:'Aguardando dados de embarque', desc:`${nome} · ${inv} · ${status}` });
    }
  });

  const urgentes = alertas.filter(a=>a.tipo==='urgente').length;
  const avisos = alertas.filter(a=>a.tipo==='aviso').length;

  let html = '<div class="spacer">';

  if(alertas.length === 0) {
    html += `<div style="text-align:center;padding:50px 20px">
      <i class="ti ti-circle-check" style="font-size:48px;color:#3b6d11;opacity:.5"></i>
      <p style="margin-top:12px;font-size:14px;font-weight:600;color:#3b6d11">Tudo em ordem!</p>
      <p style="margin-top:4px;font-size:12px;color:var(--text3)">Nenhum vencimento ou embarque com pendência.</p>
    </div>`;
  } else {
    if(urgentes > 0) html += `<div class="sec-title" style="margin-top:0"><i class="ti ti-alert-circle" style="color:#a32d2d"></i> Urgente (${urgentes})</div>`;
    alertas.filter(a=>a.tipo==='urgente').forEach(a => {
      html += `<div class="alerta-item urgente"><i class="ti ${a.icon} alerta-icon"></i><div><div class="alerta-titulo">${a.titulo}</div><div class="alerta-desc">${a.desc}</div></div></div>`;
    });
    if(avisos > 0) html += `<div class="sec-title"><i class="ti ti-alert-triangle" style="color:#854f0b"></i> Atenção (${avisos})</div>`;
    alertas.filter(a=>a.tipo==='aviso').forEach(a => {
      html += `<div class="alerta-item aviso"><i class="ti ${a.icon} alerta-icon"></i><div><div class="alerta-titulo">${a.titulo}</div><div class="alerta-desc">${a.desc}</div></div></div>`;
    });
    const infos = alertas.filter(a=>a.tipo==='info');
    if(infos.length > 0) html += `<div class="sec-title"><i class="ti ti-info-circle" style="color:#0c447c"></i> Informações (${infos.length})</div>`;
    infos.forEach(a => {
      html += `<div class="alerta-item info"><i class="ti ${a.icon} alerta-icon"></i><div><div class="alerta-titulo">${a.titulo}</div><div class="alerta-desc">${a.desc}</div></div></div>`;
    });
  }

  html += '</div>';
  document.getElementById('sec-alertas').innerHTML = html;

  // Badge na aba
  const tabAlertas = document.querySelector('.tab');
  if(urgentes > 0) tabAlertas.innerHTML = `<i class="ti ti-bell" style="color:#a32d2d"></i><span style="background:#a32d2d;color:#fff;border-radius:10px;font-size:9px;padding:1px 5px;margin-left:2px">${urgentes}</span>`;
}

// ── RESUMO ────────────────────────────────────────────────────────────────────
function buildResumo() {
  const totPedUSD = D.ped.reduce((s,p)=>s+num(p,'Real USD'),0);
  const totPagoUSD = D.ped.reduce((s,p)=>s+num(p,'Pago USD'),0);
  const totPedRMB = D.ped.reduce((s,p)=>s+num(p,'Real RMB'),0);
  const totPagoRMB = D.ped.reduce((s,p)=>s+num(p,'Pago RMB'),0);
  const saldoUSD = D.ped.reduce((s,p)=>s+num(p,'Saldo USD'),0);
  const saldoRMB = D.ped.reduce((s,p)=>s+num(p,'Saldo RMB'),0);
  const totalBRL = saldoUSD*5.4 + saldoRMB*0.75;

  const cards = D.forn.map(f => {
    const cod = val(f,'Código')||val(f,'Codigo'), nome = val(f,'Fornecedor'), status = val(f,'Status');
    const c = cor(cod), sl = saldoForn(cod);
    const brl = sl.usd*5.4 + sl.rmb*0.75;
    const peds = D.ped.filter(p=>val(p,'Código')==cod||val(p,'Codigo')==cod);
    const pedU=peds.reduce((s,p)=>s+num(p,'Real USD'),0), pagoU=peds.reduce((s,p)=>s+num(p,'Pago USD'),0);
    const pedR=peds.reduce((s,p)=>s+num(p,'Real RMB'),0), pagoR=peds.reduce((s,p)=>s+num(p,'Pago RMB'),0);
    return `<div class="card">
      <div class="card-header" onclick="tog(this)">
        <div class="sup-ini" style="background:${c.bg};color:${c.fg}">${ini(nome)}</div>
        <div class="card-title"><h3>${nome}</h3><p>${status} · ${fmtBRL(brl)} a pagar</p></div>
        <i class="ti ti-chevron-down chevron"></i>
      </div>
      <div class="card-body">
        <div style="margin:10px 0">${badge(status)}</div>
        <div class="stat-row">
          <div class="stat-box"><div class="sl">Pedido</div><div class="sv">${fmt(pedU)}</div></div>
          <div class="stat-box"><div class="sl">Pago</div><div class="sv verde">${fmt(pagoU)}</div></div>
          <div class="stat-box"><div class="sl">Saldo</div><div class="sv ${sl.usd>0?'vermelho':'verde'}">${fmt(sl.usd)}</div></div>
        </div>
        ${pedR>0?`<div class="stat-row" style="margin-top:6px">
          <div class="stat-box"><div class="sl">Pedido RMB</div><div class="sv">${fmt(pedR,'RMB')}</div></div>
          <div class="stat-box"><div class="sl">Pago RMB</div><div class="sv verde">${fmt(pagoR,'RMB')}</div></div>
          <div class="stat-box"><div class="sl">Saldo RMB</div><div class="sv vermelho">${fmt(sl.rmb,'RMB')}</div></div>
        </div>`:''}
        <div class="sec-title" style="margin-top:12px">Pedidos</div>
        <div class="inv-list">${peds.map(p=>{
          const inv=val(p,'Invoice / BT'), vU=num(p,'Real USD'), vR=num(p,'Real RMB'), sU=num(p,'Saldo USD'), sR=num(p,'Saldo RMB');
          const obs=val(p,'Observação')||val(p,'Observacao')||val(p,'Status');
          return `<div class="inv-row">
            <div><div class="ir-ref">${inv}</div><div class="ir-sub">${obs}</div></div>
            <div class="ir-val"><div class="ir-total">${vU?fmt(vU):fmt(vR,'RMB')}</div>
            <div class="ir-saldo ${(sU||sR)>0?'vermelho':'verde'}">saldo: ${sU?fmt(sU):fmt(sR,'RMB')}</div></div>
          </div>`;
        }).join('')}</div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('sec-resumo').innerHTML = `<div class="spacer"></div>
    <div class="totals-banner">
      <div class="tb-title">Saldo total a pagar</div>
      <div class="tb-val">${fmtBRL(totalBRL)}</div>
      <div style="font-size:11px;opacity:.6;margin-top:2px">Câmbio: USD×5,40 · RMB×0,75</div>
      <div class="tb-row">
        <div><div class="tbi-l">Saldo USD</div><div class="tbi-v">${fmt(saldoUSD)}</div></div>
        <div><div class="tbi-l">Saldo RMB</div><div class="tbi-v">${fmt(saldoRMB,'RMB')}</div></div>
      </div>
    </div>
    <div class="summary-grid">
      <div class="sum-card"><div class="sum-label">Total pedido USD</div><div class="sum-val">${fmt(totPedUSD)}</div></div>
      <div class="sum-card"><div class="sum-label">Total pago USD</div><div class="sum-val verde">${fmt(totPagoUSD)}</div></div>
      <div class="sum-card"><div class="sum-label">Total pedido RMB</div><div class="sum-val">${fmt(totPedRMB,'RMB')}</div></div>
      <div class="sum-card"><div class="sum-label">Total pago RMB</div><div class="sum-val verde">${fmt(totPagoRMB,'RMB')}</div></div>
    </div>
    <div class="sec-title">Por fornecedor</div>${cards}`;
}

// ── PAGAMENTOS ────────────────────────────────────────────────────────────────
function buildPagamentos() {
  const sorted = [...D.pag].sort((a,b) => {
    const da = parseDate(val(a,'Data')), db = parseDate(val(b,'Data'));
    return (db||0) - (da||0);
  });
  const html = sorted.map(p => {
    const moeda = val(p,'Moeda')||'USD';
    const obs = val(p,'Observação')||val(p,'Observacao');
    return `<div class="pag-item">
      <div class="pi-left">
        <h4>${val(p,'Fornecedor')}</h4>
        <p>${val(p,'Invoice / BT')}${val(p,'Tipo')?' · '+val(p,'Tipo'):''}${obs?' · '+obs:''}</p>
      </div>
      <div class="pi-right">
        <div class="pi-val">- ${fmt(num(p,'Valor'),moeda)}</div>
        <div class="pi-date">${fmtDate(val(p,'Data'))}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sec-pagamentos').innerHTML = `<div class="spacer"></div><div class="sec-title">Pagamentos realizados · ${sorted.length} registros</div>${html}`;
}

// ── CRONOGRAMA ────────────────────────────────────────────────────────────────
function buildCronograma() {
  const html = D.cron.map(c => {
    const moeda = val(c,'Moeda')||'USD';
    const d30 = val(c,'Data 30%'), d70 = val(c,'Data 70%');
    const v30 = num(c,'Valor 30%'), v70 = num(c,'Valor 70%');
    const dias30 = diasAte(d30), dias70 = diasAte(d70);
    function cls(dias) { return dias===null?'':dias<0?'vencido':dias<=7?'vencido':dias<=15?'proximo':''; }
    return `<div class="crono-item">
      <div class="crono-head">
        <div>
          <div class="crono-ref">${val(c,'Fornecedor')} — ${val(c,'Invoice / Pedido')}</div>
          <div class="crono-sub">${val(c,'Observação')||val(c,'Observacao')||'Saldo: '+fmt(num(c,'Saldo'),moeda)}</div>
        </div>
        <span class="badge ${moeda==='RMB'?'bg-amber':'bg-blue'}">${moeda}</span>
      </div>
      <div class="crono-grid">
        <div class="crono-box">
          <div class="cb-label">Parcela 30%${dias30!==null?' · '+(dias30<0?`vencido há ${Math.abs(dias30)}d`:`${dias30}d`):''}  </div>
          <div class="cb-val ${cls(dias30)}">${fmt(v30,moeda)}</div>
          <div class="cb-date">${fmtDate(d30)}</div>
        </div>
        <div class="crono-box">
          <div class="cb-label">Parcela 70%${dias70!==null?' · '+(dias70<0?`vencido há ${Math.abs(dias70)}d`:`${dias70}d`):''}  </div>
          <div class="cb-val ${cls(dias70)}">${fmt(v70,moeda)}</div>
          <div class="cb-date">${fmtDate(d70)}</div>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sec-cronograma').innerHTML = `<div class="spacer"></div><div class="sec-title">Agenda de pagamentos</div>${html}`;
}

// ── EMBARQUES ────────────────────────────────────────────────────────────────
function buildEmbarques() {
  const html = D.emb.map(e => {
    const status = val(e,'Status');
    const sc = status.includes('Finalizado')?'#3b6d11':status.includes('Embarcado')?'#0c447c':status.includes('Cancel')?'#a32d2d':'#854f0b';
    const eta = val(e,'ETA')||val(e,'Eta');
    const diasEta = diasAte(eta);
    const etaAtrasado = diasEta !== null && diasEta < 0 && !status.includes('Finalizado') && !status.includes('Cancel');
    const desc = val(e,'Descrição')||val(e,'Descricao');
    return `<div class="emb-item">
      <div class="emb-head">
        <div>
          <div class="emb-nome">${val(e,'Fornecedor')} · ${val(e,'Pedido / Invoice')}</div>
          <div class="emb-sub">${val(e,'Filial')||''}${val(e,'Ref. MEX')?' · '+val(e,'Ref. MEX'):''}</div>
        </div>
        <span style="font-size:11px;font-weight:600;color:${sc};white-space:nowrap;margin-left:8px">${status}</span>
      </div>
      ${desc?`<div class="emb-desc">${desc.substring(0,120)}${desc.length>120?'...':''}</div>`:''}
      <div class="emb-datas">
        <div class="emb-dt"><div class="ed-l">Prontidão</div><div class="ed-v">${fmtDate(val(e,'Prontidão')||val(e,'Prontidao'))||'—'}</div></div>
        <div class="emb-dt"><div class="ed-l">ETD</div><div class="ed-v">${fmtDate(val(e,'ETD')||val(e,'Etd'))||'—'}</div></div>
        <div class="emb-dt"><div class="ed-l">ETA</div><div class="ed-v ${etaAtrasado?'atrasado':''}">${fmtDate(eta)||'—'}</div></div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('sec-embarques').innerHTML = `<div class="spacer"></div><div class="sec-title">Embarques · ${D.emb.length} registros</div>${html}`;
}

// ── BUSCA ────────────────────────────────────────────────────────────────────
function doSearch(q) {
  const el = document.getElementById('search-results');
  q = q.trim().toLowerCase();
  if(!q){el.innerHTML='<p style="color:var(--text3);font-size:13px;text-align:center;padding:30px 0">Digite para buscar</p>';return;}
  const results = [];

  D.forn.forEach(f => {
    const cod=val(f,'Código')||val(f,'Codigo'), nome=val(f,'Fornecedor'), prod=val(f,'Produto');
    if([nome,cod,prod].some(v=>v.toLowerCase().includes(q))) {
      const sl=saldoForn(cod);
      results.push(`<div class="result-item"><div class="r-tag">Fornecedor</div><div class="r-title">${nome} (${cod})</div><div class="r-sub">${badge(val(f,'Status'))} · Saldo ${fmtBRL(sl.usd*5.4+sl.rmb*0.75)}</div></div>`);
    }
  });
  D.ped.forEach(p => {
    const inv=val(p,'Invoice / BT'), obs=val(p,'Observação')||val(p,'Observacao');
    if([inv,obs,val(p,'Fornecedor')].some(v=>v.toLowerCase().includes(q))) {
      const sU=num(p,'Saldo USD'),sR=num(p,'Saldo RMB'),vU=num(p,'Real USD'),vR=num(p,'Real RMB');
      results.push(`<div class="result-item"><div class="r-tag">Pedido / Invoice</div><div class="r-title">${inv}</div><div class="r-sub">${val(p,'Fornecedor')} · Total: ${vU?fmt(vU):fmt(vR,'RMB')} · <span class="${(sU||sR)>0?'vermelho':'verde'}">Saldo: ${sU?fmt(sU):fmt(sR,'RMB')}</span>${obs?'<br>'+obs:''}</div></div>`);
    }
  });
  D.pag.forEach(p => {
    const inv=val(p,'Invoice / BT'), nome=val(p,'Fornecedor'), obs=val(p,'Observação')||val(p,'Observacao');
    if([inv,nome,obs].some(v=>v.toLowerCase().includes(q))) {
      results.push(`<div class="result-item"><div class="r-tag">Pagamento</div><div class="r-title">${fmt(num(p,'Valor'),val(p,'Moeda')||'USD')} · ${fmtDate(val(p,'Data'))}</div><div class="r-sub">${nome} · ${inv}${val(p,'Tipo')?' · '+val(p,'Tipo'):''}</div></div>`);
    }
  });
  D.emb.forEach(e => {
    const inv=val(e,'Pedido / Invoice'), ref=val(e,'Ref. MEX'), desc=val(e,'Descrição')||val(e,'Descricao'), nome=val(e,'Fornecedor');
    if([inv,ref,desc,nome].some(v=>v.toLowerCase().includes(q))) {
      results.push(`<div class="result-item"><div class="r-tag">Embarque</div><div class="r-title">${inv}</div><div class="r-sub">${nome} · ${val(e,'Status')} · ETA: ${fmtDate(val(e,'ETA')||val(e,'Eta'))}</div></div>`);
    }
  });
  el.innerHTML = results.length ? results.join('') : '<div style="text-align:center;padding:40px 20px;color:var(--text3)"><i class="ti ti-search-off" style="font-size:32px;opacity:.3"></i><p style="margin-top:8px">Nenhum resultado</p></div>';
}

// ── CONTROLES ────────────────────────────────────────────────────────────────
function tog(h) { h.parentElement.classList.toggle('open'); }
function setTab(name, el) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('sec-'+name).classList.add('active');
  el.classList.add('active');
}

function showError(msg) {
  document.getElementById('sec-alertas').innerHTML = `<div class="spacer"></div>
    <div class="error-box"><h3><i class="ti ti-alert-circle"></i> Erro ao carregar dados</h3>
    <p>${msg}</p><p style="margin-top:6px">Verifique sua conexão e tente novamente.</p></div>
    <button class="retry-btn" onclick="reload()"><i class="ti ti-refresh"></i> Tentar novamente</button>`;
}

function buildAll() {
  buildAlertas(); buildResumo(); buildPagamentos(); buildCronograma(); buildEmbarques();
  const t = lastSync.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('app-sub').textContent = `Extrapower · atualizado às ${t}`;
}

async function reload() {
  document.getElementById('app-sub').textContent = 'Extrapower · atualizando...';
  try { await loadAll(); buildAll(); }
  catch(e) { showError(e.message); }
}

async function init() {
  try { await loadAll(); buildAll(); }
  catch(e) { showError(e.message); }
}

init();
</script>
</body>
</html>
